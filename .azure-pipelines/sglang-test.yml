trigger:
  branches:
    include:
    - main
    - release/*
  paths:
    exclude:
    - .devcontainer/**
    - .github/**
    - docker/**
    - docs/**
    - '**/*.md'

pr:
  branches:
    include:
    - main
    - release/*
  drafts: false
  paths:
    exclude:
      - .devcontainer/**
      - .github/**
      - docker/**
      - docs/**
      - '**/*.md'

jobs:
- job: sglangtest
  displayName: SGLANG Test
  strategy:
    matrix:
      sglang:
        containerImage: lmsysorg/sglang:latest


  pool:
    name: msccl-ci
  container:
    image: $(containerImage)

  steps:
  - template: templates/integration-test.yaml
    parameters:
      subscription:     mscclpp-ci
      vmssName:         mscclpp-ci
      sshKeySecureFile: mscclpp.pem
      gpuArch:          '80'

  pool:
    name: msccl-ci-h100
  container:
    image: $(containerImage)

  steps:
  - template: templates/integration-test.yaml
    parameters:
      subscription:     mscclpp-ci-h100
      vmssName:         mscclpp-h100-ci
      sshKeySecureFile: mscclpp.pem
      perfBaselineFile: test/deploy/perf_ndmv5.jsonl
      gpuArch:          '90'
