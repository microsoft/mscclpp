trigger:
  branches:
    include:
    - main
    - release/*
  paths:
    exclude:
    - .devcontainer/**
    - .github/**
    - apps/**
    - docker/**
    - docs/**
    - '**/*.md'

pr:
  branches:
    include:
    - main
    - release/*
  drafts: false
  paths:
    exclude:
      - .devcontainer/**
      - .github/**
      - apps/**
      - docker/**
      - docs/**
      - '**/*.md'

jobs:
- job: CodeCoverageA100
  timeoutInMinutes: 40
  pool:
    name: msccl-ci
  variables:
  - group: mscclpp
  strategy:
    matrix:
      cuda12:
        containerImage: ghcr.io/microsoft/mscclpp/mscclpp:base-dev-cuda12.9

  container:
    image: $(containerImage)

  steps:
  - template: templates/codecov.yaml
    parameters:
      subscription:     mscclpp-ci
      vmssName:         mscclpp-ci
      sshKeySecureFile: mscclpp.pem
      gpuArch:          '80'

- job: CodeCoverageH100
  timeoutInMinutes: 40
  pool:
    name: msccl-ci-h100
  variables:
  - group: mscclpp
  strategy:
    matrix:
      cuda12:
        containerImage: ghcr.io/microsoft/mscclpp/mscclpp:base-dev-cuda12.9

  container:
    image: $(containerImage)

  steps:
  - template: templates/codecov.yaml
    parameters:
      subscription:     mscclpp-ci-h100
      vmssName:         mscclpp-h100-ci
      sshKeySecureFile: mscclpp.pem
      gpuArch:          '90'

- job: CodeCoverageMI300X
  timeoutInMinutes: 40
  pool:
    name: msccl-ci-mi300x
  variables:
  - group: mscclpp
  strategy:
    matrix:
      rocm6_2:
        containerImage: ghcr.io/microsoft/mscclpp/mscclpp:base-dev-rocm6.2

  container:
    image: $(containerImage)

  steps:
  - template: templates/codecov.yaml
    parameters:
      subscription:     mscclpp-ci-mi300x
      vmssName:         mscclpp-mi300x-ci
      sshKeySecureFile: mscclpp.pem
      platform:         rocm
      gpuArch:          gfx942
