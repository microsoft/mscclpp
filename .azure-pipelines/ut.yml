trigger:
  branches:
    include:
    - main
    - release/*
  paths:
    exclude:
    - .devcontainer/**
    - .github/**
    - apps/**
    - docker/**
    - docs/**
    - '**/*.md'

pr:
  branches:
    include:
    - main
    - release/*
  drafts: false
  paths:
    exclude:
      - .devcontainer/**
      - .github/**
      - apps/**
      - docker/**
      - docs/**
      - '**/*.md'

jobs:
- job: UnitTestA100
  # Up to 6h of VMSS start retries + 6h node hold + build overhead.
  timeoutInMinutes: 780
  pool:
    name: msccl-ci
  strategy:
    matrix:
      cuda12:
        containerImage: ghcr.io/microsoft/mscclpp/mscclpp:base-dev-cuda12.9

  container:
    image: $(containerImage)

  steps:
  - template: templates/ut.yml
    parameters:
      subscription:     mscclpp-ci
      vmssName:         mscclpp-ci
      gpuArch:          '80'
