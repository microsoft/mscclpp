trigger:
  branches:
    include:
    - main
    - release/*
  paths:
    exclude:
    - .devcontainer/**
    - .github/**
    - docker/**
    - docs/**
    - '**/*.md'

pr:
  branches:
    include:
    - main
    - release/*
  drafts: false
  paths:
    exclude:
      - .devcontainer/**
      - .github/**
      - docker/**
      - docs/**
      - '**/*.md'

jobs:
- job: sglangtest
  displayName: SGLANG Test
  strategy:
    matrix:
      sglang:
        containerImage: ghcr.io/microsoft/mscclpp/mscclpp:base-sglang-x86_64

  pool:
    name: msccl-ci
  container:
    image: $(containerImage)

  steps:
  - template: templates/sglang-test.yml
    parameters:
      subscription:     mscclpp-ci
      vmssName:         mscclpp-ci
      sshKeySecureFile: mscclpp.pem
      gpuArch:          '80'
