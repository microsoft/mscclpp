parameters:
- name: subscription
  type: string
- name: vmssName
  type: string
- name: platform
  type: string
  default: 'cuda'
- name: gpuArch
  type: string

steps:
- template: deploy.yml
  parameters:
    subscription:     ${{ parameters.subscription }}
    vmssName:         ${{ parameters.vmssName }}
    platform:         ${{ parameters.platform }}
    gpuArch:          ${{ parameters.gpuArch }}
    deployArgs:       'single-node-test true ${{ parameters.platform }}'

- task: AzureCLI@2
  displayName: Print SSH connection info
  inputs:
    azureSubscription: ${{ parameters.subscription }}
    scriptType: bash
    scriptLocation: inlineScript
    inlineScript: |
      set +e
      echo "=================== DEBUG NODE READY ==================="
      echo "VMSS : ${{ parameters.vmssName }} (resource group: mscclpp)"
      echo "Hostfile entry (internal address):"
      cat test/deploy/hostfile_ci
      echo
      echo "Public IPs:"
      az vmss list-instance-public-ips \
        --name ${{ parameters.vmssName }} \
        --resource-group mscclpp \
        --query "[].ipAddress" -o tsv || echo "(none; reach the node over the private network / jumpbox)"
      echo
      echo "How to connect:"
      echo "  1. ssh -i <mscclpp.pem> azureuser@<node-ip>"
      echo "  2. sudo docker exec -it mscclpp-test bash"
      echo "  Source is mounted at /root/mscclpp; build output at /root/mscclpp/build"
      echo "======================================================="

- task: Bash@3
  displayName: Hang node for SSH debugging
  inputs:
    targetType: inline
    script: |
      set -e
      echo "Holding node for 6 hours. Cancel this job to release it early."
      sleep $(( 6 * 60 * 60 ))
      echo "Hang finished; releasing node."

- template: stop.yml
  parameters:
    subscription: ${{ parameters.subscription }}
    vmssName:     ${{ parameters.vmssName }}
