parameters:
- name: subscription
  type: string
- name: vmssName
  type: string
- name: platform
  type: string
  default: 'cuda'
- name: gpuArch
  type: string

steps:
- template: deploy.yml
  parameters:
    subscription:     ${{ parameters.subscription }}
    vmssName:         ${{ parameters.vmssName }}
    platform:         ${{ parameters.platform }}
    gpuArch:          ${{ parameters.gpuArch }}
    deployArgs:       'single-node-test true ${{ parameters.platform }}'


- template: run-remote-task.yml
  parameters:
    name: UnitTests
    displayName: Run mscclpp unit tests
    remoteScript: |
      ./build/bin/unit_tests

- template: run-remote-task.yml
  parameters:
    name: MpUnitTests
    displayName: Run mscclpp multi-process unit tests
    remoteScript: |
      mpirun --allow-run-as-root -tag-output -np 2 ./build/bin/mp_unit_tests
      mpirun --allow-run-as-root -tag-output -np 4 ./build/bin/mp_unit_tests
      mpirun --allow-run-as-root -tag-output -np 8 ./build/bin/mp_unit_tests

- template: run-remote-task.yml
  parameters:
    name: PyTests
    displayName: Run pytests
    remoteScript: |
      mpirun --allow-run-as-root -tag-output -x MSCCLPP_HOME=/root/mscclpp -x GPU_MAX_HW_QUEUES=8 -np 8 python3 -m pytest ./python/test/test_mscclpp.py -x
      mpirun --allow-run-as-root -tag-output -x MSCCLPP_HOME=/root/mscclpp -x GPU_MAX_HW_QUEUES=8 -np 8 python3 -m pytest ./python/test/test_fp8_accum.py -x

- template: run-remote-task.yml
  parameters:
    name: PyBench
    displayName: Run microbenchmark
    remoteScript: |
      mpirun --allow-run-as-root -tag-output -x GPU_MAX_HW_QUEUES=8 -np 8 python3 ./python/mscclpp_benchmark/bench_collective.py --collective allreduce --dtype float8_e4m3b15 --accum-type float32 --autotune
      mpirun --allow-run-as-root -tag-output -x GPU_MAX_HW_QUEUES=8 -np 8 python3 ./python/mscclpp_benchmark/bench_collective.py --collective allreduce --dtype float16 --symmetric-memory --autotune
      mpirun --allow-run-as-root -tag-output -x GPU_MAX_HW_QUEUES=8 -np 8 python3 ./python/mscclpp_benchmark/bench_collective.py --collective allgather --dtype float8_e4m3b15 --autotune
- template: stop.yml
  parameters:
    subscription: ${{ parameters.subscription }}
    vmssName:     ${{ parameters.vmssName }}
