# =============================================================================
# SGLang single-node test template.
#
# Runs on the pipeline agent and dispatches remote steps to a single VMSS GPU
# node (via run-remote-task.yml). Steps:
#   1. Deploy: build the test container and bring the VMSS node online.
#   2. Build and install MSCCL++ on the node.
#   3. Install a (currently forked) SGLang.
#   4. Run sglang.bench_one_batch at several batch sizes (kept as separate
#      steps for per-batch visibility in the Azure DevOps UI).
#   5. Run a longer end-to-end validation: bring up an sglang server and
#      drive it with sglang.bench_serving.
#   6. Run the MSCCL++ all-reduce micro-benchmark via torchrun.
#   7. Stop / deallocate the VMSS node.
# =============================================================================

parameters:
- name: subscription
  type: string
- name: vmssName
  type: string
- name: gpuArch
  type: string
- name: containerName
  type: string
  default: 'sglang-mscclpp-test'

steps:
# deployArgs positional fields: <test-mode> <use-gpu> <cuda|rocm>
- template: deploy.yml
  parameters:
    subscription: ${{ parameters.subscription }}
    vmssName: ${{ parameters.vmssName }}
    gpuArch: ${{ parameters.gpuArch }}
    deployArgs: 'single-node-test true cuda'
    containerName: ${{ parameters.containerName }}

# TODO: Switch to the official upstream sglang repo once Caio's PR is merged.
# Tracking: the fork below (`caiomcbr/sglang` @ caiorocha/mscclpp) is a personal branch and
# should not remain a long-term CI dependency. Also consider pinning to a
# release branch or commit SHA for reproducibility.
- template: run-remote-task.yml
  parameters:
    name: InstallSGLang
    displayName: Install SGLang
    runRemoteArgs: '--container ${{ parameters.containerName }}'
    remoteScript: |
      git clone -b main https://github.com/caiomcbr/sglang.git
      cd sglang/python
      pip install -e .

- template: run-remote-task.yml
  parameters:
    name: RunSGLangBenchOneBatch
    displayName: Run SGLang Bench One Batch
    runRemoteArgs: '--container ${{ parameters.containerName }}'
    remoteScript: |
      export FLASHINFER_DISABLE_VERSION_CHECK=1
      python -m sglang.bench_one_batch --model-path Qwen/Qwen3-8B --batch 1 2 4 8 16 32 64 128 256 512 --input-len 256 --output-len 256 --tp-size 8 --enable-mscclpp

- template: run-remote-task.yml
  parameters:
    name: RunSGLangValidationTest
    displayName: Run SGLang Validation Test
    runRemoteArgs: '--container ${{ parameters.containerName }}'
    remoteScript: |
      export FLASHINFER_DISABLE_VERSION_CHECK=1

      # The fork's pyproject.toml excludes `benchmark*` from installed
      # packages, but bench_serving.py imports from sglang.benchmark.datasets.
      # Put the source tree on PYTHONPATH so the benchmark subpackage resolves.
      if [ -d "$(pwd)/sglang/python/sglang/benchmark" ]; then
        export PYTHONPATH="$(pwd)/sglang/python:${PYTHONPATH:-}"
      fi

      echo "Directory: $(pwd)"

      # Launch sglang server in the background
      sglang serve \
        --model-path Qwen/Qwen3-8B \
        --port 30000 \
        --host 0.0.0.0 \
        --tp 8 \
        --swa-full-tokens-ratio 1.0 \
        --max-prefill-tokens 16384 \
        --chunked-prefill-size 16384 \
        --mem-fraction-static 0.85 \
        --max-running-requests 512 \
        --attention-backend triton \
        --grammar-backend outlines \
        --schedule-policy fcfs \
        --enable-mscclpp \
        > /tmp/sglang_server.log 2>&1 &
      SERVER_PID=$!

      # Wait for the server to be ready (poll the health endpoint)
      echo "Waiting for sglang server to be ready..."
      MAX_WAIT=600
      ELAPSED=0
      until curl -s http://localhost:30000/health > /dev/null 2>&1; do
        if ! kill -0 $SERVER_PID 2>/dev/null; then
          echo "Server process died. Logs:"
          cat /tmp/sglang_server.log
          exit 1
        fi
        if [ $ELAPSED -ge $MAX_WAIT ]; then
          echo "Server did not become ready within ${MAX_WAIT}s. Logs:"
          cat /tmp/sglang_server.log
          exit 1
        fi
        sleep 5
        ELAPSED=$((ELAPSED + 5))
      done
      echo "Server is ready after ${ELAPSED}s"

      RESULTS_DIR=/tmp/sglang_bench_results
      mkdir -p "$RESULTS_DIR"

      # Run the benchmark
      python3 -m sglang.bench_serving \
        --backend sglang \
        --host 127.0.0.1 \
        --port 30000 \
        --dataset-name random \
        --random-input-len 512 \
        --random-output-len 8129 \
        --max-concurrency 512 \
        --disable-stream \
        --num-prompts 10 \
        --seed 42 \
        --request-rate inf \
        --output-file "$RESULTS_DIR/run.jsonl" \
        2>&1 | tee "$RESULTS_DIR/bench_serving.log"

      echo "Benchmark completed. Results:"
      cat "$RESULTS_DIR/run.jsonl" || true

# Depends on the `sglang/` source tree cloned by the InstallSGLang step above
# (steps on the same remote share a working directory).
- template: run-remote-task.yml
  parameters:
    name: RunSGLangTestAllReduce
    displayName: Run SGLang Test All Reduce
    runRemoteArgs: '--container ${{ parameters.containerName }}'
    remoteScript: |
      export FLASHINFER_DISABLE_VERSION_CHECK=1
      export NODE_SIZE=1
      export WORLD_SIZE=8
      export RANK=0

      cd sglang

      torchrun --nproc_per_node $WORLD_SIZE \
      --nnodes $NODE_SIZE \
      --node_rank $RANK \
      benchmark/kernels/all_reduce/benchmark_mscclpp.py

- template: stop.yml
  parameters:
    subscription: ${{ parameters.subscription }}
    vmssName: ${{ parameters.vmssName }}
